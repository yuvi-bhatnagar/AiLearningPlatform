version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ailearning_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=AiLearningDbPass123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  redis:
    image: redis:alpine
    container_name: ailearning_redis
    ports:
      - "6379:6379"

volumes:
  mssql_data:
